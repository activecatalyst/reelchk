<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reel.chk</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111110">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="reel.chk">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23111110'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%23e8e4dc' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%23e8c547'/%3E%3Ccircle cx='16' cy='7' r='2' fill='%23e8e4dc'/%3E%3Ccircle cx='16' cy='25' r='2' fill='%23e8e4dc'/%3E%3Ccircle cx='7' cy='16' r='2' fill='%23e8e4dc'/%3E%3Ccircle cx='25' cy='16' r='2' fill='%23e8e4dc'/%3E%3Ccircle cx='9.7' cy='9.7' r='2' fill='%23e8e4dc'/%3E%3Ccircle cx='22.3' cy='22.3' r='2' fill='%23e8e4dc'/%3E%3Ccircle cx='22.3' cy='9.7' r='2' fill='%23e8e4dc'/%3E%3Ccircle cx='9.7' cy='22.3' r='2' fill='%23e8e4dc'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111110;
    --bg2: #1a1917;
    --bg3: #232220;
    --border: #383530;
    --border-bright: #4a4640;
    --text: #f0ece3;
    --text-dim: #9a948a;
    --text-muted: #5a5550;
    --accent: #e8c547;
    --accent-dim: #b09a35;
    --red: #d45a48;
    --green: #5aaa70;
    --grain-opacity: 0.025;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; overflow: hidden; }

  body {
    overflow-x: hidden;
    overflow-y: auto;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    min-height: 100vh;
    cursor: crosshair;
  }

  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: -60px;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: var(--grain-opacity);
    pointer-events: none;
    z-index: 9999;
    animation: grain 0.5s steps(1) infinite;
  }

  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-1%, -1.5%); }
    20% { transform: translate(1.5%, 1%); }
    30% { transform: translate(-0.5%, 2%); }
    40% { transform: translate(1%, -0.5%); }
    50% { transform: translate(-1.5%, 0.5%); }
    60% { transform: translate(0.5%, -1%); }
    70% { transform: translate(-1%, 1.5%); }
    80% { transform: translate(1.5%, -1.5%); }
    90% { transform: translate(-0.5%, 1%); }
  }

  /* LETTERBOX BARS */
  body::after {
    content: '';
    position: fixed;
    left: 0; right: 0;
    height: 36px;
    background: #000;
    pointer-events: none;
    z-index: 998;
    top: 0;
    box-shadow: 0 0 0 100vh transparent;
  }

  .letterbox-bottom {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 36px;
    background: #000;
    pointer-events: none;
    z-index: 998;
  }

  /* LAYOUT */
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 64px 32px 64px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 56px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.6s ease both;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1;
  }

  .logo span {
    color: var(--accent);
  }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .header-right {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-align: right;
    line-height: 1.8;
  }

  /* SEARCH SECTION */
  .search-section {
    margin-bottom: 48px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .search-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    display: block;
  }

  .search-row {
    display: flex;
    gap: 0;
    border: 1px solid var(--border-bright);
    background: var(--bg2);
    transition: border-color 0.2s;
  }

  .search-row:focus-within {
    border-color: var(--accent-dim);
  }

  .search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    padding: 16px 18px;
    letter-spacing: 0.02em;
    cursor: crosshair;
  }

  .search-input::placeholder {
    color: var(--text-muted);
    font-style: italic;
  }

  .clear-search-btn {
    background: transparent;
    border: none;
    border-left: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 13px;
    padding: 0 14px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: color 0.15s;
    flex-shrink: 0;
    display: none;
  }

  .clear-search-btn:hover { color: var(--red); }
  .clear-search-btn.visible { display: block; }

  .search-btn {
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 0.1em;
    padding: 0 26px;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .search-btn:hover {
    background: #f0d060;
  }

  .search-btn:active {
    background: var(--accent-dim);
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .filter-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 13px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-chip:hover {
    border-color: var(--border-bright);
    color: var(--text);
  }

  .filter-chip.active {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: rgba(232, 197, 71, 0.08);
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .legend-dot {
    font-size: 11px;
  }

  .legend-dot.free { color: var(--green); }
  .legend-dot.sub { color: var(--text-dim); }
  .legend-dot.leaving { color: var(--red); }
  .legend-dot.unavail { color: var(--text-muted); }

  .service-tag.leaving {
    border-color: rgba(212, 90, 72, 0.5);
    color: var(--red);
    background: rgba(212, 90, 72, 0.06);
  }

  .leaving-flag {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--red);
    border: 1px solid rgba(212, 90, 72, 0.4);
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
    opacity: 0.9;
  }

  /* CARD ACTIONS ROW */
  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  /* SHARE BUTTON */
  .share-btn {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 13px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    background: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }

  .share-btn:hover {
    border-color: var(--border-bright);
    color: var(--text);
  }

  .share-btn.copied {
    border-color: rgba(90, 170, 112, 0.5);
    color: var(--green);
  }

  /* FRANCHISE SECTION */
  .franchise-section {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .franchise-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* SYNOPSIS */
  .card-synopsis {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 14px;
    max-width: 560px;
  }

  /* RESULTS */
  .results {
    animation: fadeUp 0.4s ease both;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .results-title {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 26px;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .results-meta {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* RESULT CARD */
  .result-card {
    border: 1px solid var(--border);
    background: var(--bg2);
    margin-bottom: 2px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .result-card:hover {
    border-color: var(--border-bright);
  }

  .card-top {
    display: flex;
    align-items: stretch;
    gap: 0;
  }

  .card-accent-bar {
    width: 3px;
    background: var(--accent);
    flex-shrink: 0;
  }

  .card-accent-bar.unavailable {
    background: var(--text-muted);
  }

  .card-body {
    flex: 1;
    padding: 16px 18px;
  }

  .card-title-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 0.05em;
    color: var(--text);
    line-height: 1;
  }

  .card-year {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .card-status {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 10px;
    margin-left: auto;
  }

  .card-status.streaming {
    color: var(--green);
    border: 1px solid rgba(74, 140, 92, 0.3);
    background: rgba(74, 140, 92, 0.08);
  }

  .card-status.unavailable {
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .services-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .service-tag {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border-bright);
    color: var(--text-dim);
    background: var(--bg3);
    transition: all 0.15s;
    position: relative;
  }

  .service-tag:hover {
    color: var(--text);
    border-color: var(--accent-dim);
  }

  .service-tag.free {
    border-color: rgba(90, 170, 112, 0.5);
    color: var(--green);
    background: rgba(90, 170, 112, 0.07);
  }

  .service-tag.free::before {
    content: '✦ ';
    font-size: 8px;
  }

  .no-stream-msg {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    letter-spacing: 0.05em;
  }

  /* SUGGESTIONS SECTION */
  .suggestions-section {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .suggestions-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .suggestion-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }

  .suggestion-row:last-child { border-bottom: none; }

  .suggestion-row:hover .suggestion-title {
    color: var(--accent);
  }

  .suggestion-num {
    font-size: 11px;
    color: var(--text-muted);
    width: 20px;
    flex-shrink: 0;
  }

  .suggestion-title {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--text);
    transition: color 0.15s;
    flex: 1;
  }

  .suggestion-service {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* WATCHLIST */
  .watchlist-section {
    margin-top: 48px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .clear-btn {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: color 0.15s;
  }

  .clear-btn:hover { color: var(--red); }

  .watchlist-empty {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
    padding: 16px 0;
    letter-spacing: 0.05em;
  }

  .watchlist-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.3s ease both;
  }

  .watchlist-item:last-child { border-bottom: none; }

  .wl-title {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 16px;
    flex: 1;
    cursor: pointer;
    transition: color 0.15s;
  }

  .wl-title:hover { color: var(--accent); }

  .wl-status {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .wl-status.streaming { color: var(--green); }
  .wl-status.unavailable { color: var(--text-muted); }

  .wl-remove {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    transition: color 0.15s;
    font-family: 'DM Mono', monospace;
    padding: 2px 4px;
  }

  .wl-remove:hover { color: var(--red); }

  /* HISTORY */
  .history-section {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .history-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .history-pill {
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 6px 13px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    background: none;
    font-family: 'DM Mono', monospace;
  }

  .history-pill:hover {
    color: var(--text);
    border-color: var(--border-bright);
  }

  /* LOADER */
  .loader {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 32px 0;
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .loader-dots {
    display: flex;
    gap: 4px;
  }

  .loader-dot {
    width: 4px;
    height: 4px;
    background: var(--accent);
    animation: pulse 1s ease infinite;
  }

  .loader-dot:nth-child(2) { animation-delay: 0.15s; }
  .loader-dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.8); }
  }

  /* FOOTER */
  footer {
    margin-top: 64px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); }

  /* RESPONSIVE */
  @media (max-width: 520px) {
    .wrap { padding: 72px 16px 72px; }
    .logo { font-size: 28px; }
    .card-title { font-size: 16px; }
  }

  /* ADD TO WATCHLIST BUTTON */
  .add-wl-btn {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 13px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    background: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
    margin-top: 14px;
  }

  .add-wl-btn:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  .add-wl-btn.added {
    border-color: rgba(90, 170, 112, 0.5);
    color: var(--green);
  }

  /* FREE BADGE */
  .free-badge {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(232, 197, 71, 0.3);
    padding: 2px 6px;
    margin-left: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<div class="letterbox-bottom"></div>

<div class="wrap">

  <header>
    <div>
      <div class="logo">reel<span>.</span>chk</div>
      <div class="logo-sub">streaming availability / us</div>
    </div>
  </header>

  <section class="search-section">
    <span class="search-label">// search title</span>
    <div class="search-row">
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="film title, series..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="clear-search-btn" id="clearSearch" title="Clear">✕</button>
      <button class="search-btn" id="searchBtn">CHK</button>
    </div>
    <div class="filters">
      <button class="filter-chip active" data-filter="all">all</button>
      <button class="filter-chip" data-filter="free">free only</button>
      <button class="filter-chip" data-filter="subscription">subscription</button>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot free">✦</span> free to watch</span>
      <span class="legend-item"><span class="legend-dot sub">▪</span> subscription required</span>
      <span class="legend-item"><span class="legend-dot leaving">!</span> leaving soon</span>
      <span class="legend-item"><span class="legend-dot unavail">—</span> not streaming</span>
    </div>
  </section>

  <div id="resultsArea"></div>

  <section class="watchlist-section" id="watchlistSection">
    <div class="section-header">
      <span class="section-label">// watchlist</span>
      <button class="clear-btn" id="clearWatchlist">clear all</button>
    </div>
    <div id="watchlistItems">
      <div class="watchlist-empty">nothing saved yet — search a title and add it</div>
    </div>
  </section>

  <section class="history-section" id="historySection" style="display:none">
    <div class="section-header">
      <span class="section-label">// recent searches</span>
      <button class="clear-btn" id="clearHistory">clear all</button>
    </div>
    <div class="history-pills" id="historyPills"></div>
  </section>

  <footer>
    <span>reel.chk — 2026</span>
    <span>us · english</span>
  </footer>

</div>

<script>
const ANTHROPIC_API = "https://api.anthropic.com/v1/messages";

// State
let watchlist = JSON.parse(localStorage.getItem('reelchk_watchlist') || '[]');
let history = JSON.parse(localStorage.getItem('reelchk_history') || '[]');
let currentFilter = 'all';
let lastResult = null;

// Free streaming services
const FREE_SERVICES = ['tubi', 'pluto tv', 'peacock', 'crackle', 'kanopy', 'hoopla', 'plex', 'youtube', 'freevee', 'amazon freevee'];

// Elements
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const clearSearchBtn = document.getElementById('clearSearch');
const resultsArea = document.getElementById('resultsArea');

// Show/hide clear button as user types
searchInput.addEventListener('input', () => {
  clearSearchBtn.classList.toggle('visible', searchInput.value.length > 0);
});

// Clear search
clearSearchBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearSearchBtn.classList.remove('visible');
  resultsArea.innerHTML = '';
  lastResult = null;
  searchInput.focus();
});

// Filter chips
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    if (lastResult) renderResult(lastResult);
  });
});

// Search
searchBtn.addEventListener('click', doSearch);
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const query = searchInput.value.trim();
  if (!query) return;

  addToHistory(query);
  showLoader();

  try {
    const response = await fetch(ANTHROPIC_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a streaming availability expert for the US market. When given a movie or TV show title, respond ONLY with valid JSON — no markdown, no backticks, no preamble.

Format:
{
  "title": "Exact Title",
  "year": "YYYY",
  "synopsis": "A 1-2 sentence description of the film or show. Engaging, no spoilers.",
  "found": true,
  "streaming": true,
  "services": [
    {"name": "Netflix", "free": false, "leaving_soon": false},
    {"name": "Tubi", "free": true, "leaving_soon": true}
  ],
  "franchise": {
    "name": "Franchise or Series Name",
    "entries": [
      {"title": "Film One", "service": "Netflix", "free": false},
      {"title": "Film Two", "service": "Tubi", "free": true}
    ]
  },
  "suggestions": [
    {"title": "Similar Film", "service": "Max", "free": false},
    {"title": "Another Film", "service": "Tubi", "free": true}
  ]
}

Rules:
- "found": whether you recognize this title
- "synopsis": 1-2 sentences, punchy and spoiler-free. Empty string if not found.
- "streaming": true if available on ANY subscription or free streaming service in the US right now (not just rent/buy)
- "services": list ONLY services where it streams via subscription or free (NOT rent/buy only). Empty array if none.
- "leaving_soon": true if the title is known to be leaving that service within ~30 days. Default false if unknown.
- "franchise": if this title is part of a film series, trilogy, or franchise (e.g. Marvel, Star Wars, Lord of the Rings, X trilogy), include the franchise object with all main entries and where each is currently streaming. Omit the franchise field entirely (don't include it) if it's a standalone film or series with no sequels/prequels.
- "suggestions": 4 similar titles currently streaming if the title is not streaming, else empty array
- "free": true only if available at no extra cost (ad-supported free tiers count, e.g. Tubi, Pluto, Peacock free tier, Plex free)
- Be accurate as of early 2026. If unsure, say streaming: false and leaving_soon: false.`,
        messages: [{ role: 'user', content: query }]
      })
    });

    const data = await response.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '{}';
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);
    result.queryTitle = query;
    lastResult = result;
    renderResult(result);
  } catch (err) {
    showError();
  }
}

function filterServices(services) {
  if (!services) return [];
  if (currentFilter === 'free') return services.filter(s => s.free);
  if (currentFilter === 'subscription') return services.filter(s => !s.free);
  return services;
}

function renderResult(result) {
  const filtered = filterServices(result.services);
  const isStreaming = result.streaming && filtered.length > 0;
  const inWatchlist = watchlist.some(w => w.title === result.title);

  const servicesHTML = filtered.length > 0
    ? filtered.map(s => `
        <span class="service-tag ${s.free ? 'free' : ''} ${s.leaving_soon ? 'leaving' : ''}">
          ${s.name}
          ${s.leaving_soon ? '<span class="leaving-flag">leaving soon</span>' : ''}
        </span>`).join('')
    : `<span class="no-stream-msg">${
        currentFilter === 'free' ? 'not on any free service right now' :
        currentFilter === 'subscription' ? 'not on any subscription service right now' :
        'not streaming — rent/buy only'
      }</span>`;

  const franchiseHTML = result.franchise?.entries?.length > 0
    ? `<div class="franchise-section">
        <div class="franchise-label">// ${result.franchise.name}</div>
        ${result.franchise.entries.map((e, i) => `
          <div class="suggestion-row" onclick="searchSuggestion('${e.title.replace(/'/g, "\\'")}')">
            <span class="suggestion-num">0${i+1}</span>
            <span class="suggestion-title">${e.title}</span>
            <span class="suggestion-service">${e.service || '—'}${e.free ? ' <span class="free-badge">free</span>' : ''}</span>
          </div>
        `).join('')}
      </div>` : '';

  const suggestionsHTML = (!result.streaming || filtered.length === 0) && result.suggestions?.length > 0
    ? `<div class="suggestions-section">
        <div class="suggestions-label">// you might like</div>
        ${result.suggestions.map((s, i) => `
          <div class="suggestion-row" onclick="searchSuggestion('${s.title.replace(/'/g, "\\'")}')">
            <span class="suggestion-num">0${i+1}</span>
            <span class="suggestion-title">${s.title}</span>
            <span class="suggestion-service">${s.service}${s.free ? ' <span class="free-badge">free</span>' : ''}</span>
          </div>
        `).join('')}
      </div>` : '';

  resultsArea.innerHTML = `
    <div class="results">
      <div class="results-header">
        <div class="results-title">${result.title || result.queryTitle}</div>
        <div class="results-meta">${result.year || ''}</div>
      </div>
      <div class="result-card">
        <div class="card-top">
          <div class="card-accent-bar ${isStreaming ? '' : 'unavailable'}"></div>
          <div class="card-body">
            <div class="card-title-row">
              <span class="card-title">${result.title || result.queryTitle}</span>
              ${result.year ? `<span class="card-year">${result.year}</span>` : ''}
              <span class="card-status ${isStreaming ? 'streaming' : 'unavailable'}">
                ${isStreaming ? 'streaming' : 'not streaming'}
              </span>
            </div>
            ${result.synopsis ? `<p class="card-synopsis">${result.synopsis}</p>` : ''}
            <div class="services-list">${servicesHTML}</div>
            <div class="card-actions">
              <button class="add-wl-btn ${inWatchlist ? 'added' : ''}" onclick="toggleWatchlist('${(result.title || result.queryTitle).replace(/'/g, "\\'")}', ${result.streaming})">
                ${inWatchlist ? '✓ watchlist' : '+ watchlist'}
              </button>
              <button class="share-btn" id="shareBtn" onclick="copyShare('${(result.title || result.queryTitle).replace(/'/g, "\\'")}')">
                ↗ copy link
              </button>
            </div>
          </div>
        </div>
      </div>
      ${franchiseHTML}
      ${suggestionsHTML}
    </div>
  `;
}

function showLoader() {
  resultsArea.innerHTML = `
    <div class="loader">
      <div class="loader-dots">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
      checking availability
    </div>
  `;
}

function showError() {
  resultsArea.innerHTML = `
    <div class="loader" style="color: var(--red)">
      — error checking availability. try again.
    </div>
  `;
}

function searchSuggestion(title) {
  searchInput.value = title;
  doSearch();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyShare(title) {
  const url = `${location.origin}${location.pathname}?q=${encodeURIComponent(title)}`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('shareBtn');
    if (btn) {
      btn.textContent = '✓ copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '↗ copy link';
        btn.classList.remove('copied');
      }, 2000);
    }
  });
}

// On load — check for ?q= param and auto-search
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const q = params.get('q');
  if (q) {
    searchInput.value = q;
    clearSearchBtn.classList.add('visible');
    doSearch();
  }
});

// WATCHLIST
function toggleWatchlist(title, streaming) {
  const idx = watchlist.findIndex(w => w.title === title);
  if (idx > -1) {
    watchlist.splice(idx, 1);
  } else {
    watchlist.push({ title, streaming });
  }
  localStorage.setItem('reelchk_watchlist', JSON.stringify(watchlist));
  renderWatchlist();
  if (lastResult) renderResult(lastResult);
}

function renderWatchlist() {
  const container = document.getElementById('watchlistItems');
  if (watchlist.length === 0) {
    container.innerHTML = '<div class="watchlist-empty">nothing saved yet — search a title and add it</div>';
    return;
  }
  container.innerHTML = watchlist.map(item => `
    <div class="watchlist-item">
      <span class="wl-title" onclick="searchSuggestion('${item.title.replace(/'/g, "\\'")}')">${item.title}</span>
      <span class="wl-status ${item.streaming ? 'streaming' : 'unavailable'}">
        ${item.streaming ? 'streaming' : 'not streaming'}
      </span>
      <button class="wl-remove" onclick="toggleWatchlist('${item.title.replace(/'/g, "\\'")}', ${item.streaming})">✕</button>
    </div>
  `).join('');
}

document.getElementById('clearWatchlist').addEventListener('click', () => {
  watchlist = [];
  localStorage.setItem('reelchk_watchlist', JSON.stringify(watchlist));
  renderWatchlist();
});

document.getElementById('clearHistory').addEventListener('click', () => {
  history = [];
  localStorage.setItem('reelchk_history', JSON.stringify(history));
  renderHistory();
});

// HISTORY
function addToHistory(query) {
  history = [query, ...history.filter(h => h !== query)].slice(0, 8);
  localStorage.setItem('reelchk_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) {
    document.getElementById('historySection').style.display = 'none';
    return;
  }
  document.getElementById('historySection').style.display = 'block';
  document.getElementById('historyPills').innerHTML = history.map(h => `
    <button class="history-pill" onclick="searchSuggestion('${h.replace(/'/g, "\\'")}')"> ${h}</button>
  `).join('');
}

// INIT
renderWatchlist();
renderHistory();

// PWA — register service worker (GitHub Pages only)
if ('serviceWorker' in navigator && location.hostname === 'activecatalyst.github.io') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/reelchk/service-worker.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
</body>
</html>
